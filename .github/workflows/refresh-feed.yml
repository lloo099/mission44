name: Refresh feed

# Keeps data/feed.json fresh: curated highlights (data/feed_pinned.json) are
# always preserved, and the latest arXiv papers are appended automatically.
on:
  schedule:
    - cron: "17 6 * * *"   # daily at 06:17 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-feed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh feed from arXiv
        run: python3 scripts/fetch_arxiv.py --max 10

      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain data/feed.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/feed.json
            git commit -m "chore: auto-refresh feed from arXiv"
            git push
          else
            echo "No feed changes."
          fi
